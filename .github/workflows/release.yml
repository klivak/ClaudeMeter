name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeMeter ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            target/release/claudemeter.exe

      - name: VirusTotal Scan
        if: env.VT_API_KEY != ''
        uses: crazy-max/ghaction-virustotal@v4
        id: virustotal
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            target/release/claudemeter.exe

      - name: Add VirusTotal link to Release
        if: steps.virustotal.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BODY=$(gh release view "${{ steps.version.outputs.VERSION }}" --json body -q .body)
          VT_ANALYSIS="${{ steps.virustotal.outputs.analysis }}"
          VT_URL=$(echo "$VT_ANALYSIS" | sed 's|=.*||')
          gh release edit "${{ steps.version.outputs.VERSION }}" \
            --notes "${CURRENT_BODY}

          ---

          🛡️ **VirusTotal Scan:** [View full report](${VT_URL})"
